<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بدون اتصال</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: transform 0.2s;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button:active {
      transform: translateY(0);
    }

    .info {
      background: #f0f4ff;
      border-right: 4px solid #667eea;
      padding: 15px;
      margin-top: 30px;
      border-radius: 8px;
      font-size: 14px;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>بدون اتصال إنترنت</h1>
    <p>لا يوجد اتصال إنترنت في الوقت الحالي، ولكن يمكنك الاستمرار في استخدام التطبيق مع بياناتك المحفوظة محلياً.</p>
    
    <button class="button" onclick="location.reload()">حاول مجدداً</button>
    
    <div class="info">
      <strong>💾 ملاحظة:</strong> جميع بياناتك محفوظة محلياً على جهازك وستُحفظ تلقائياً عند عودة الاتصال.
    </div>
  </div>
</body>
</html>
